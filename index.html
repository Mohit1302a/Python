<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 3rem;
        }

        p {
            font-size: 1.2rem;
            margin: 20px 0;
        }

        .btn {
            padding: 12px 25px;
            background: white;
            color: #764ba2;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #f0f0f0;
        }

        footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🚀 Welcome to Django</h1>
        <p>✨ Your web app is running successfully!</p>

        <p>🔥 Build fast, secure, and scalable apps with Django.</p>

        <button class="btn">Explore More 🚀</button>
    </div>

    <footer>
        Made with ❤️ using Django | 💻 Happy Coding!
    </footer>

</body>
</html>
